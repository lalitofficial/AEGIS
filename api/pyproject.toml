[tool.ruff]
target-version = "py311"
line-length = 100
exclude = ["env", ".venv", "data"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["B008"]  # FastAPI's Depends(...) in defaults is idiomatic

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"
