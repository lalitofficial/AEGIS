services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegis_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # Override in production; this default is for local development only.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aegis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-aegis_db}
      DATABASE_ECHO: "False"
      # Override these in production; the defaults are for local development only.
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      API_KEY: ${API_KEY:-dev-key}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_API_KEY: ${VITE_API_KEY:-dev-key}
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - api

volumes:
  postgres_data:
